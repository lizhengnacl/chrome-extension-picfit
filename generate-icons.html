<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图适配图标生成器</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h1 {
      color: #7c3aed;
      margin-top: 0;
    }
    .icons {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      margin: 40px 0;
      justify-content: center;
    }
    .icon-item {
      text-align: center;
      padding: 20px;
      background: #f9fafb;
      border-radius: 12px;
    }
    .icon-item svg {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: white;
    }
    .icon-item p {
      margin: 12px 0 0;
      font-size: 14px;
      color: #4b5563;
      font-weight: 500;
    }
    button {
      background: #7c3aed;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      margin: 10px 5px;
      font-weight: 500;
      transition: background 0.2s;
    }
    button:hover {
      background: #6d28d9;
    }
    button:disabled {
      background: #a78bfa;
      cursor: not-allowed;
    }
    .download-all {
      background: #10b981;
    }
    .download-all:hover {
      background: #059669;
    }
    .status {
      margin-top: 20px;
      padding: 16px;
      border-radius: 8px;
      display: none;
    }
    .status.success {
      background: #d1fae5;
      color: #065f46;
      display: block;
    }
    .instructions {
      background: #f3f4f6;
      padding: 24px;
      border-radius: 12px;
      margin-top: 30px;
    }
    .instructions h3 {
      margin-top: 0;
      color: #374151;
    }
    .instructions ol {
      margin: 12px 0 0 20px;
      padding: 0;
    }
    .instructions li {
      margin: 8px 0;
      color: #4b5563;
    }
    code {
      background: #e5e7eb;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Monaco', 'Consolas', monospace;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 图适配 (PicFit) 图标生成器</h1>
    
    <div class="icons" id="icons"></div>
    
    <div style="text-align: center;">
      <button id="downloadAll" class="download-all">📥 一键下载所有图标</button>
    </div>
    
    <div id="status" class="status"></div>
    
    <div class="instructions">
      <h3>📝 使用说明</h3>
      <ol>
        <li>点击"一键下载所有图标"按钮，或单独下载每个尺寸</li>
        <li>将下载的图标保存到 <code>src/public/icons/</code> 目录</li>
        <li>确保文件名分别为：<code>icon16.png</code>, <code>icon32.png</code>, <code>icon48.png</code>, <code>icon128.png</code></li>
        <li>运行 <code>pnpm build</code> 重新构建扩展</li>
      </ol>
    </div>
  </div>

  <script>
    const sizes = [16, 32, 48, 128];
    
    const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#grad)"/>
  <g transform="translate(24, 24)">
    <rect x="4" y="4" width="72" height="72" rx="8" fill="white" opacity="0.9"/>
    <rect x="16" y="16" width="48" height="48" rx="4" fill="none" stroke="#7c3aed" stroke-width="3"/>
    <line x1="16" y1="32" x2="64" y2="32" stroke="#7c3aed" stroke-width="2" stroke-dasharray="4,2"/>
    <line x1="40" y1="16" x2="40" y2="64" stroke="#7c3aed" stroke-width="2" stroke-dasharray="4,2"/>
    <circle cx="16" cy="16" r="4" fill="#7c3aed"/>
    <circle cx="64" cy="16" r="4" fill="#7c3aed"/>
    <circle cx="16" cy="64" r="4" fill="#7c3aed"/>
    <circle cx="64" cy="64" r="4" fill="#7c3aed"/>
  </g>
</svg>`;
    
    function createIconSVG(size) {
      return svgContent
        .replace(/width="128"/, 'width="' + size + '"')
        .replace(/height="128"/, 'height="' + size + '"');
    }
    
    function downloadPNG(size) {
      return new Promise((resolve) => {
        const svg = createIconSVG(size);
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        
        const img = new Image();
        img.onload = function() {
          ctx.drawImage(img, 0, 0, size, size);
          const link = document.createElement('a');
          link.download = 'icon' + size + '.png';
          link.href = canvas.toDataURL('image/png');
          link.click();
          setTimeout(resolve, 300);
        };
        img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
      });
    }
    
    const container = document.getElementById('icons');
    const downloadAllBtn = document.getElementById('downloadAll');
    const statusDiv = document.getElementById('status');
    
    sizes.forEach(size => {
      const div = document.createElement('div');
      div.className = 'icon-item';
      div.innerHTML = createIconSVG(size) + 
        '<p>' + size + 'x' + size + '</p>' +
        '<button onclick="downloadPNG(' + size + ')">下载</button>';
      container.appendChild(div);
    });
    
    downloadAllBtn.addEventListener('click', async () => {
      downloadAllBtn.disabled = true;
      downloadAllBtn.textContent = '下载中...';
      
      for (let i = 0; i < sizes.length; i++) {
        await downloadPNG(sizes[i]);
      }
      
      downloadAllBtn.disabled = false;
      downloadAllBtn.textContent = '📥 一键下载所有图标';
      
      statusDiv.textContent = '✅ 所有图标已下载！请保存到 src/public/icons/ 目录';
      statusDiv.className = 'status success';
    });
  </script>
</body>
</html>
